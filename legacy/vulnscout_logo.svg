<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#00ff88;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88" />
      <stop offset="100%" style="stop-color:#00d4ff" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="shieldClip">
      <path d="M 60 25 L 110 25 L 110 90 Q 110 125 85 140 Q 60 125 60 90 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="600" height="200" fill="url(#bgGrad)" rx="12"/>

  <!-- Subtle grid lines -->
  <g stroke="#1e2530" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="40" x2="600" y2="40"/>
    <line x1="0" y1="80" x2="600" y2="80"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="160" x2="600" y2="160"/>
    <line x1="60" y1="0" x2="60" y2="200"/>
    <line x1="120" y1="0" x2="120" y2="200"/>
    <line x1="180" y1="0" x2="180" y2="200"/>
  </g>

  <!-- Shield outline -->
  <path d="M 60 28 L 112 28 L 112 90 Q 112 128 86 144 Q 60 128 60 90 Z"
        fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.3"/>

  <!-- Shield body -->
  <path d="M 63 31 L 109 31 L 109 90 Q 109 124 86 139 Q 63 124 63 90 Z"
        fill="#0d1117" stroke="#00ff88" stroke-width="1" opacity="0.15"/>

  <!-- Shield scan line (horizontal sweep) -->
  <rect x="63" y="70" width="46" height="2" fill="url(#scanGrad)" opacity="0.9" filter="url(#glow)"/>

  <!-- Magnifying glass inside shield -->
  <circle cx="83" cy="78" r="14" fill="none" stroke="#00d4ff" stroke-width="2" filter="url(#subtleGlow)" opacity="0.9"/>
  <circle cx="83" cy="78" r="9" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  <line x1="93" y1="88" x2="103" y2="99" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round" filter="url(#subtleGlow)" opacity="0.9"/>

  <!-- Bug / target reticle inside magnifying glass -->
  <circle cx="83" cy="78" r="3" fill="#ff4466" filter="url(#glow)" opacity="0.95"/>
  <line x1="79" y1="78" x2="76" y2="78" stroke="#ff4466" stroke-width="1" opacity="0.7"/>
  <line x1="87" y1="78" x2="90" y2="78" stroke="#ff4466" stroke-width="1" opacity="0.7"/>
  <line x1="83" y1="74" x2="83" y2="71" stroke="#ff4466" stroke-width="1" opacity="0.7"/>
  <line x1="83" y1="82" x2="83" y2="85" stroke="#ff4466" stroke-width="1" opacity="0.7"/>

  <!-- Shield bottom glow dot -->
  <circle cx="86" cy="134" r="2" fill="#00ff88" opacity="0.6" filter="url(#glow)"/>

  <!-- VULNSCOUT wordmark -->
  <text x="130" y="105"
        font-family="'Courier New', Courier, monospace"
        font-size="52"
        font-weight="700"
        letter-spacing="2"
        fill="url(#textGrad)"
        filter="url(#subtleGlow)">VULNSCOUT</text>

  <!-- Tagline -->
  <text x="132" y="130"
        font-family="'Courier New', Courier, monospace"
        font-size="13"
        letter-spacing="3"
        fill="#4a5568">AI-POWERED VULNERABILITY RESEARCH</text>

  <!-- Decorative corner brackets -->
  <g stroke="#00ff88" stroke-width="1" opacity="0.25" fill="none">
    <path d="M 8 8 L 8 22 M 8 8 L 22 8"/>
    <path d="M 592 8 L 578 8 M 592 8 L 592 22"/>
    <path d="M 8 192 L 8 178 M 8 192 L 22 192"/>
    <path d="M 592 192 L 578 192 M 592 192 L 592 178"/>
  </g>

  <!-- Version tag -->
  <rect x="496" y="148" width="88" height="20" rx="4" fill="#1a2332" stroke="#00ff88" stroke-width="0.5" opacity="0.6"/>
  <text x="540" y="162"
        font-family="'Courier New', Courier, monospace"
        font-size="10"
        fill="#00ff88"
        text-anchor="middle"
        opacity="0.7">v0.1.0 • claude</text>
</svg>
